name: Build DLL
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          make
    - name: Build cslol-patcher-legacy
      run: |
        cd cslol-patcher-legacy
        mkdir build && cd build
        cmake .. -G "MSYS Makefiles"
        cmake --build .
    - name: Upload DLL Artifact
      uses: actions/upload-artifact@v4
      with:
        name: cslol-dll-legacy
        path: cslol-patcher-legacy/build/libcslol-dll-legacy.dll
